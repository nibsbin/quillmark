name: Release

on:
  pull_request:
    types:
      - closed
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short

jobs:
  # ──────────────────────────────────────────────
  # Gate: only run when a release/* PR is merged
  # ──────────────────────────────────────────────
  release:
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Generate tagger token
        id: tagger
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.TAGGER_APP_ID }}
          private-key: ${{ secrets.TAGGER_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ steps.tagger.outputs.token }}

      - name: Extract version from workspace
        id: version
        run: |
          VERSION=$(cargo metadata --format-version=1 --no-deps \
            | jq -r '.packages[] | select(.name == "quillmark") | .version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Validate release branch matches version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          EXPECTED="release/v${VERSION}"
          ACTUAL="${{ github.event.pull_request.head.ref }}"

          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Branch/version mismatch: expected '$EXPECTED' but got '$ACTUAL'"
            exit 1
          fi

      - name: Create tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.tagger.outputs.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Detect pre-release versions (contain a hyphen, e.g. 0.59.0-rc.1)
          if [[ "$VERSION" == *-* ]]; then
            echo "Pre-release detected: v${VERSION}"
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --notes "Pre-release v${VERSION}" \
              --prerelease
          else
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --notes "Release v${VERSION}" \
              --latest
          fi

  # ──────────────────────────────────────────────
  # Publish: Rust crates → crates.io
  # ──────────────────────────────────────────────
  publish-crates:
    needs: [release]
    runs-on: ubuntu-latest
    environment: Publish
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Authenticate with crates.io (Trusted Publishing)
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish workspace crates
        run: cargo publish --locked --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}

      - name: Summary
        run: echo "✓ Workspace crates v${{ needs.release.outputs.version }} published to crates.io"

  # ──────────────────────────────────────────────
  # Publish: WASM → npm
  # ──────────────────────────────────────────────
  publish-wasm:
    needs: [release]
    runs-on: ubuntu-latest
    environment: Publish
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.118

      - name: Build WASM packages
        run: ./scripts/build-wasm.sh

      - name: Install npm test dependencies
        working-directory: crates/bindings/wasm
        run: npm install

      - name: Run WASM tests
        working-directory: crates/bindings/wasm
        run: npx vitest run

      # npm 11.5.1+ required for Trusted Publishers (OIDC)
      - name: Upgrade npm for Trusted Publishers
        run: npm install -g npm@latest

      - name: Publish @quillmark/wasm
        working-directory: pkg
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            npm publish --access public --provenance --tag next
          else
            npm publish --access public --provenance
          fi

      - name: Summary
        run: echo "✓ @quillmark/wasm v${{ needs.release.outputs.version }} published to npm"

  # ──────────────────────────────────────────────
  # Publish: Python → PyPI
  # ──────────────────────────────────────────────
  build-python-linux:
    needs: [release]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter 3.10 3.11 3.12
          sccache: 'true'
          manylinux: auto
          working-directory: crates/bindings/python

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: crates/bindings/python/dist/*.whl

  build-python-windows:
    needs: [release]
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter 3.10 3.11 3.12
          sccache: 'true'
          working-directory: crates/bindings/python

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: crates/bindings/python/dist/*.whl

  build-python-macos:
    needs: [release]
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter 3.10 3.11 3.12
          sccache: 'true'
          working-directory: crates/bindings/python

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: crates/bindings/python/dist/*.whl

  build-python-sdist:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: crates/bindings/python

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: crates/bindings/python/dist/*.tar.gz

  publish-python:
    needs: [release, build-python-linux, build-python-windows, build-python-macos, build-python-sdist]
    runs-on: ubuntu-latest
    environment: Publish
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Summary
        run: echo "✓ quillmark v${{ needs.release.outputs.version }} published to PyPI"

  # ──────────────────────────────────────────────
  # Summary gate
  # ──────────────────────────────────────────────
  release-success:
    needs: [release, publish-crates, publish-wasm, publish-python]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Release summary
        run: |
          echo "## Release v${{ needs.release.outputs.version }} Summary"
          echo ""

          # Release
          if [ "${{ needs.release.result }}" == "success" ]; then
            echo "✓ release"
          else
            echo "✗ release (${{ needs.release.result }})"
          fi

          # Crates
          if [ "${{ needs.publish-crates.result }}" == "success" ]; then
            echo "✓ publish-crates"
          else
            echo "✗ publish-crates (${{ needs.publish-crates.result }})"
          fi

          # WASM
          if [ "${{ needs.publish-wasm.result }}" == "success" ]; then
            echo "✓ publish-wasm"
          else
            echo "✗ publish-wasm (${{ needs.publish-wasm.result }})"
          fi

          # Python
          if [ "${{ needs.publish-python.result }}" == "success" ]; then
            echo "✓ publish-python"
          else
            echo "✗ publish-python (${{ needs.publish-python.result }})"
          fi

      - name: Fail if any job failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
