name: Publish Package to npmjs

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    # Permissions are the most important part of OIDC
    permissions:
      contents: read
      id-token: write 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # No registry-url needed for Trusted Publishing!

      - name: Install dependencies
        run: npm ci

      - name: Static Analysis (Lint)
        run: npm run lint
      - name: Build Package
        run: npm run build

      - name: Publish to npm
        # Ensure 'Trusted Publishers' is configured in your npmjs.com settings
        run: npm publish --provenance --access public